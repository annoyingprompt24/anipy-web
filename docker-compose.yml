services:
  anipy-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: anipy-web:latest
    container_name: anipy-web
    restart: unless-stopped
    ports:
      - "${PORT:-8088}:8088"
    volumes:
      - ${DOWNLOAD_DIR:?DOWNLOAD_DIR must be set in stack environment}:/downloads
      - anipy-data:/data
    environment:
      - ANIPY_USER=${ANIPY_USER}
      - ANIPY_PASS=${ANIPY_PASS}
      - DOWNLOAD_DIR=/downloads/anime

volumes:
  anipy-data:
    driver: local
